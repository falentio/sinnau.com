pre-commit:
  jobs:
    - run: pnpm run format
      stage_fixed: true
    - run: pnpm run lint:agent

pre-merge-commit:
  parallel: true
  jobs:
    - run: pnpm run check
    - run: pnpm run format:check

pre-push:
  parallel: true
  jobs:
    - run: pnpm run check
    - run: pnpm run db:check
    - run: pnpm run test
