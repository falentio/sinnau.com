name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check
        env:
          BETTER_AUTH_SECRET: ci-placeholder
          BETTER_AUTH_URL: http://localhost:11085
          DB_FILE_NAME: /tmp/ci.db

      - run: pnpm run test
