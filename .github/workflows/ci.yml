name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: ci-placeholder
      BETTER_AUTH_URL: http://localhost:11085
      DB_FILE_NAME: /tmp/ci.db
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check

      - run: pnpm run lint:agent

      - run: pnpm run format:check

      - run: pnpm run db:check

      - run: pnpm run test
