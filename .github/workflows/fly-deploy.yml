# Deploy staging to Fly.io on every push to main.
name: Fly Deploy (Staging)

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:staging-${{ github.sha }}
          build-args: |
            APP_BUILD_DATE=${{ steps.date.outputs.date }}
            APP_SHA=${{ github.sha }}
            APP_VERSION=staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --image ghcr.io/${{ github.repository }}:staging-${{ github.sha }} --config fly.staging.toml --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGGING }}
